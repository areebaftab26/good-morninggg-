<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hope you smile after seeing this❤️</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            /* 🌹 Beautiful Red Roses & Tulips Background (Fixed Link) */
            background-image: linear-gradient(rgba(255, 235, 235, 0.8), rgba(255, 235, 235, 0.85)), 
                              url('https://unsplash.com');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            margin: 0;
            padding: 40px 20px;
            box-sizing: border-box;
            text-align: center;
            overflow-y: auto; /* 📜 Always allow free scrolling */
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(255, 255, 255, 0.94); /* Soft glass effect */
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.12);
            margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        h1 { color: #ff4d4d; margin-bottom: 20px; text-transform: capitalize; }
        #message {
            font-size: 18px;
            line-height: 1.7;
            min-height: 100px;
            white-space: pre-line;
            margin-bottom: 30px;
            text-align: left;
        }
        .meter-container {
            margin-top: 20px;
            display: none;
        }
        input[type="range"] {
            width: 80%;
            accent-color: #ff4d4d;
        }
        #status {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            color: #ff4d4d;
        }
        /* 🎯 Dynamic Extra Instruction Text Below Meter */
        #extraInstruction {
            font-size: 16px;
            font-weight: 500;
            margin-top: 15px;
            color: #d63384;
            line-height: 1.5;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="headline">Good Morning...💗</h1>
    <div id="message"></div>

    <div class="meter-container" id="meterSection">
        <p><strong>Your current mood:</strong></p>
        <input type="range" id="moodSlider" min="0" max="100" value="0" oninput="updateMeter(this.value)">
        <div id="status">Still in a bad mood 😡 (0%)</div>
        <!-- 🎯 Extra Message Box -->
        <div id="extraInstruction"></div>
    </div>
</div>

<script>
const text = "I know you're not in a good mood today bhot down hai energy tumhari kuch dino se I know well aur pehli baar aisa hua hai ki 2 dino se sameera good morning ka reply bhi nhi de rhi, but fine it is, I'm always here for you in every situation mai ne pehle b kai baar kaha hai you remember na, i know abhi tum irritate ho rhi hogi ya mood ikdm low hoga isiliye...\n\nSo I am trying my best to bring a little smile to your face cause it really hurts when I see you sad like this.\ntumhari khushi, tumhara hasna, tumhara muskurana and most important tumhara hona all are very important and precious to me, and I will always make sure to keep you smiling and happy I don't care whatever it takes. ab code to likh sakta hu main par code me gaana kaise gaaun mtlb gaa to sakta hu par abhi mai likh deta hu tum meri awaaz me sun lo heh (duniya jahan ki baat tumse keh du dil ki baato me lafz kho du mil jaaye nazre aankhon se mai ye keh du, baat karna ghabra tum na jaana, choro duniya ko tum ho jaaye gumsum mmmmm haazir hu mai, tumhara hi hu mai bolo ek duje me kho jaaye hum tum mmmmm\n\nSo now can you please smile a little for me? (please mana mat krna na dil tut jaayega heh has b do na ab bhot pyaari lgti ho haste huye) chlo now.....Check the meter below... 👇";    
let index = 0;
    const messageEl = document.getElementById('message');
    const meterSection = document.getElementById('meterSection');
    const extraInstructionEl = document.getElementById('extraInstruction');

    function typeEffect() {
        if (index < text.length) {
            messageEl.innerHTML += text.charAt(index);
            index++;
            
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 50) {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }
            
            setTimeout(typeEffect, 90); 
        } else {
            meterSection.style.display = 'block';
            setTimeout(() => {
                window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
            }, 200);
        }
    }

    function updateMeter(val) {
        const statusEl = document.getElementById('status');
        const headlineEl = document.getElementById('headline');
        
        if (val < 30) {
            statusEl.innerHTML = `Still in a bad mood 😡 (${val}%)`;
            extraInstructionEl.innerHTML = ""; // Empty initially
        } else if (val >= 30 && val < 100) {
            // 🤨 Handles 30% to 99% logic dynamically
            if (val >= 30 && val < 70) {
                statusEl.innerHTML = `Theek thaak thoda 🤨 (${val}%)`;
            } else {
                statusEl.innerHTML = `Almost Smiled 🫣 (${val}%)`;
            }
            // 🎯 Cheating warning message injection
            extraInstructionEl.innerHTML = "no sameera mai dkh rha hu tumhe no cheating chlo jaldi se 100% pe slide kro heh";
        } else if (val == 100) {
            // 🎉 Fully 100% happy logic execution
            statusEl.innerHTML = `Yay! Fully Happy! ❤️ (100%)`;
            headlineEl.innerHTML = "Thank You Sameera! 🥰";
            extraInstructionEl.innerHTML = "yay now ab 100% happy ho gyi ho to ek baar upar scroll karke heading dkh lo🤌🏻";
        }
    }

    window.onload = typeEffect;
</script>

</body>
  </html>
