<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>I am Sorry ❤️</title>
    <style>
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #ffe6e6;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
            text-align: center;
        }
        .container {
            max-width: 600px;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }
        h1 { color: #ff4d4d; margin-bottom: 20px; }
        #message {
            font-size: 18px;
            line-height: 1.6;
            min-height: 100px;
            white-space: pre-line;
            margin-bottom: 30px;
        }
        .meter-container {
            margin-top: 20px;
            display: none;
        }
        input[type="range"] {
            width: 80%;
            accent-color: #ff4d4d;
        }
        #status {
            font-size: 20px;
            font-weight: bold;
            margin-top: 15px;
            color: #ff4d4d;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 id="headline">Hey... 🥺</h1>
    <div id="message"></div>

    <div class="meter-container" id="meterSection">
        <p><strong>Forgiveness Meter:</strong></p>
        <input type="range" id="forgiveSlider" min="0" max="100" value="0" oninput="updateMeter(this.value)">
        <div id="status">Angry 😡 (0%)</div>
    </div>
</div>

<script>
    // Customize your typing message below. Use \n for a new line.
    const text = "I am really sorry for what happened...\nI never meant to hurt you or make you sad.\nYou mean the world to me, and I want to make things right.\n\nCan you please forgive me? Check the meter below... 👇";
    let index = 0;
    const messageEl = document.getElementById('message');
    const meterSection = document.getElementById('meterSection');

    function typeEffect() {
        if (index < text.length) {
            messageEl.innerHTML += text.charAt(index);
            index++;
            setTimeout(typeEffect, 50); // Speed of typing (lower = faster)
        } else {
            meterSection.style.display = 'block';
        }
    }

    function updateMeter(val) {
        const statusEl = document.getElementById('status');
        const headlineEl = document.getElementById('headline');
        
        if (val < 30) {
            statusEl.innerHTML = `Still Angry 😡 (${val}%)`;
        } else if (val >= 30 && val < 70) {
            statusEl.innerHTML = `Thinking about it 🤨 (${val}%)`;
        } else if (val >= 70 && val < 100) {
            statusEl.innerHTML = `Almost Forgiven 🫣 (${val}%)`;
        } else if (val == 100) {
            statusEl.innerHTML = `Yay! Fully Forgiven! ❤️ (100%)`;
            headlineEl.innerHTML = "Thank You! 🥰";
        }
    }

    // Start typing effect on load
    window.onload = typeEffect;
</script>

</body>
</html>
